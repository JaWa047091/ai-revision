<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT AI Code Review</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        #chat-container { width: 300px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; background: #fff; }
        #chat-log { height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; }
        #user-input { width: calc(100% - 22px); }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-log">
            <p><strong>AI:</strong> Hello! How can I assist you today?</p>
        </div>
        <input type="text" id="user-input" placeholder="Type your message..." />
        <button id="send-btn">Send</button>
    </div>
    <script>
        document.getElementById('send-btn').onclick = function() {
            const input = document.getElementById('user-input');
            const userMessage = input.value;
            if (userMessage) {
                const log = document.getElementById('chat-log');
                log.innerHTML += `<p><strong>You:</strong> ${userMessage}</p>`;
                input.value = '';
                // Simulate AI response
                setTimeout(() => {
                    log.innerHTML += `<p><strong>AI:</strong> Thank you for your message!</p>`;
                    log.scrollTop = log.scrollHeight;
                }, 1000);
            }
        };
    </script>
</body>
</html>
