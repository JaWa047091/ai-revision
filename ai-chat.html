<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>ChatGPT Chatbot</title>\n    <style>\n        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }\n        #chat-container { width: 400px; max-width: 90%; margin: 50px auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; }\n        #chat-box { background-color: #fff; height: 500px; overflow-y: auto; padding: 20px; }\n        .message { margin: 10px 0; }\n        .bot { text-align: left; }\n        .user { text-align: right; }\n        #user-input { padding: 10px; border: none; width: calc(100% - 60px); }\n        #send-btn { padding: 10px; border: none; background-color: #007BFF; color: white; cursor: pointer; }\n        #send-btn:hover { background-color: #0056b3; }\n    </style>\n</head>\n<body>\n    <div id="chat-container">\n        <div id="chat-box"></div>\n        <input type="text" id="user-input" placeholder="Type a message..." />\n        <button id="send-btn">Send</button>\n    </div>\n    <script>\n        const chatBox = document.getElementById('chat-box');\n        const userInput = document.getElementById('user-input');\n        const sendBtn = document.getElementById('send-btn');\n        \n        sendBtn.addEventListener('click', function() {\n            const userMessage = userInput.value;\n            if (userMessage) {\n                addMessage('user', userMessage);\n                generateAIResponse(userMessage);\n                userInput.value = '';\n            }\n        });\n        \n        function addMessage(sender, message) {\n            const messageDiv = document.createElement('div');\n            messageDiv.className = 'message ' + sender;\n            messageDiv.textContent = message;\n            chatBox.appendChild(messageDiv);\n            chatBox.scrollTop = chatBox.scrollHeight;\n        }\n        \n        function generateAIResponse(userMessage) {\n            // Simple keyword-based AI response logic\n            let aiMessage = 'I am not sure how to respond to that.';\n            if (userMessage.includes('hello')) {\n                aiMessage = 'Hello! How can I assist you today?';\n            } else if (userMessage.includes('help')) {\n                aiMessage = 'Sure! What do you need help with?';\n            } else if (userMessage.includes('how are you')) {\n                aiMessage = 'I am just a computer program, but thanks for asking!';\n            }\n            addMessage('bot', aiMessage);\n        }\n    </script>\n</body>\n</html>
