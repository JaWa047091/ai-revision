<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>ChatGPT Interface</title>\n    <script>\n        async function sendMessage() {\n            const userMessage = document.getElementById('userInput').value;\n            const chatHistory = document.getElementById('chatHistory');\n            chatHistory.innerHTML += `<div>You: ${userMessage}</div>`;\n            document.getElementById('userInput').value = '';\n\n            const response = await fetch('https://api-inference.huggingface.co/models/gpt-3.5-turbo', {\n                method: 'POST',\n                headers: {\n                    'Authorization': 'Bearer YOUR_HUGGINGFACE_API_TOKEN', // Replace with your token\n                    'Content-Type': 'application/json'\n                },\n                body: JSON.stringify({ inputs: userMessage })\n            });\n            const data = await response.json();\n            chatHistory.innerHTML += `<div>ChatGPT: ${data[0].generated_text}</div>`;\n        }\n    </script>\n</head>\n<body>\n    <h1>ChatGPT Interface</h1>\n    <div id="chatHistory" style="border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px;"></div>\n    <input type="text" id="userInput" placeholder="Type your message here..."/>\n    <button onclick="sendMessage()">Send</button>\n</body>\n</html>\n
