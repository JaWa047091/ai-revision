<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Secure GitHub AI</title>\n    <script>\n        function saveToken() {\n            const token = document.getElementById('token').value;\n            sessionStorage.setItem('githubToken', token);\n            alert('Token saved in session storage.');\n        }\n    <\/script>\n</head>\n<body>\n    <h1>Connect to GitHub Models AI API</h1>\n    <form onsubmit="event.preventDefault(); saveToken();">\n        <label for="token">GitHub Personal Access Token:</label><br>\n        <input type="text" id="token" name="token" required><br><br>\n        <input type="submit" value="Save Token">\n    </form>\n    <p>Use the saved token to connect to the API.</p>\n</body>\n</html>
